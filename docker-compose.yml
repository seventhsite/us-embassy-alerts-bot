services:
  bot:
    build: .
    container_name: usembassy-alerts-bot
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3, os; db=os.getenv('DB_PATH','/data/bot.db'); sqlite3.connect(db).execute('SELECT 1'); print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
